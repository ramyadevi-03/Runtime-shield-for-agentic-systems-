# mcp-firewall Policy Configuration
# This file defines the security guardrails for the keycloak-mcp-server

# Global Configuration
global:
  dashboard_port: 9090
  audit_log: audit.log
  fail_open: false  
secrets:
  enabled: true
  action: redact

pii:
  enabled: true
  action: redact
  severity: medium
  placeholder: "[PII REDACTED]"
  # Presidio entity types to detect for standard users.
  # "ALL" turns on all standard Presidio PII recognizers dynamically.
  presidio_entities:
    - ALL
  # Entity types to exclude from auto-detection to prevent false-positives (like row IDs flagged as years)
  presidio_exclude_entities:
    - DATE_TIME

nemo_cloud:
  enabled: true
  jailbreak_rail:
    enabled: true
    severity_threshold: 0.7
  pii_rail:
    enabled: true
    detect_entities: ["PERSON", "EMAIL_ADDRESS", "PHONE_NUMBER", "LOCATION", "CREDIT_CARD"]
  topical_rail:
    enabled: true
    allowed_topics: 
      - "Software development and engineering"
      - "System administration and DevOps"
      - "Cloud computing and MCP protocol"
      - "Cybersecurity and defense"
    blocked_topics:
      - "Financial advice and investment"
      - "Medical diagnosis and health"
      - "Political campaigning and opinions"
      - "Adult content and violence"

# Agent Identities & RBAC (Optional)
# We handle permissions in the general rules section below
agents: {}

# Zones and Environments (for Risk Assessment)
zones:
  - name: production
    color: red
    priority: critical
  - name: staging
    color: yellow
    priority: medium
  - name: dev
    color: blue
    priority: low

# Dynamic Blocks (Auto-populated by Quarantine Tool)
dynamic_blocks: []

# General Rules (evaluated in order: FIRST MATCH WINS)
rules:
#  # 0. Redact PII (Emails) from any response (DISABLED to test Microsoft NLP)
#  - name: redact-emails
#    tool: "*"
#    action: redact
#    message: "PII Redaction: Automated email masking active."
#    match:
#      arguments:
#        role: "user"
#      response:
#        regex: ".*@.*"
  # 1. Block directory traversal patterns (using globs)
  - name: block-traversal
    tool: "read_file|list_directory|write_file"
    match:
      arguments:
        path: "**/../*"
        role: "user"
    action: deny
    message: "Security violation: Potential directory traversal detected."

  # 2. Block specific unauthorized directories
  - name: block-admin-access
    tool: "read_file|list_directory"
    match:
      arguments:
        path: "admin/*"
        role: "user"
    action: deny
    message: "Access denied: The 'admin/' directory is off-limits."

  # 3. Allow access to the authorized folder
  - name: allow-claude-files
    tool: "read_file|list_directory|write_file"
    match:
      arguments:
        path: "secure-experiment-zone/claude-desktop**"
    action: allow
    message: "Workspace Access: Internal configuration tools permitted."

  # 4. Allow access to the Secure Experiment Zone (Safe Agent Workspace)
  - name: allow-experiment-zone-access
    tool: "read_file|list_directory|write_file"
    match:
      arguments:
        path: "secure-experiment-zone**"
    action: allow
    message: "Sandbox Access: Authorized experiment zone operations."

  # 4. Block all other filesystem access for standard users (Defense in Depth)
  - name: block-unauthorized-fs
    tool: "read_file|list_directory|write_file"
    match:
      arguments:
        role: "user"
    action: deny
    message: "Security violation: Unauthorized filesystem access attempt."

  # 5. Block access to environment credential files (.env) for ALL roles
  - name: block-env-access
    tool: "read_file|write_file"
    match:
      arguments:
        path: "**.env*"
    action: deny
    message: "Security exception: Access to environment credential files (.env) is strictly prohibited for all roles."

  # 5. Allow admin unrestricted filesystem access throughout the project (inside and outside the zone)
  - name: allow-admin-unrestricted-fs
    tool: "read_file|list_directory|write_file"
    match:
      arguments:
        role: "admin"
    action: allow
    message: "Admin Access: Unrestricted filesystem access permitted."

  # 5. HONEYPOT TRAPS: Block access to fake internal tools without internal-admin scope
  - name: block-honeypots
    tool: "get_system_config|fetch_internal_db"
    action: deny
    message: "CRITICAL VIOLATION: Access to internal system management tools is strictly prohibited."
    priority: critical

  # 6. Default Allow for other tools (like Keycloak)
  - name: allow-keycloak-tools
    tool: "keycloak_*"
    action: allow
    message: "Governance: Identity management access granted."
    zone: staging # Default zone for these tools

  # 7. Default Allow for Sandboxed Database tools
  - name: allow-database-tools
    tool: "GetCurrentUser|GetUserTransactions"
    action: allow
    message: "Governance: Jailed database operations permitted."
    zone: production

# Threat Feed Integration
threat_feed:
  enabled: true
  update_interval: 24h

# Tool Registry and MCP Server Routing
mcp_servers:
  filesystem-provider:
    command: "node"
    args: ["c:/Users/Lenovo/Desktop/Runtime-shield- login/Runtime-shield-for-agentic-systems/dist/index.js", "c:/Users/Lenovo/Desktop/Runtime-shield- login/Runtime-shield-for-agentic-systems"]
    tools:
      - name: "read_file"
        scope: "tool:read_file"
      - name: "write_file"
        scope: "tool:write_file"
      - name: "list_directory"
        scope: "tool:list_directory"
      - name: "get_system_config"
        scope: "tool:admin_internal"
      - name: "fetch_internal_db"
        scope: "tool:admin_internal"
  
  keycloak-provider:
    command: "node"
    args: ["c:/Users/Lenovo/Desktop/Runtime-shield- login/Runtime-shield-for-agentic-systems/dist/index.js"]
    tools:
      - name: "keycloak_list_users"
        scope: "tool:keycloak_read"
      - name: "keycloak_list_user_sessions"
        scope: "tool:keycloak_read"
      - name: "keycloak_revoke_user_sessions"
        scope: "tool:keycloak_admin"
      - name: "keycloak_get_user_events"
        scope: "tool:keycloak_read"
      - name: "keycloak_security_report"
        scope: "tool:keycloak_report"
      - name: "keycloak_generate_policy"
        scope: "tool:keycloak_report"
      - name: "keycloak_quarantine_user"
        scope: "tool:keycloak_admin"

  database-provider:
    command: "python"
    args: ["-u", "c:/Users/Lenovo/Desktop/Runtime-shield- login/Runtime-shield-for-agentic-systems/database_mcp.py"]
    tools:
      - name: "GetCurrentUser"
        scope: "tool:keycloak_read"
      - name: "GetUserTransactions"
        scope: "tool:keycloak_read"
